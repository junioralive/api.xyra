<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Xyra API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000000;
      font-family: 'Inter', sans-serif;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-pill {
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.05s; }
    .reveal-delay-2 { transition-delay: 0.1s; }
    .reveal-delay-3 { transition-delay: 0.15s; }
    .float {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
</head>
<body class="text-zinc-400 antialiased min-h-screen flex flex-col px-6">

      <img src="https://xyra.stream/logo.png" alt="Xyra Logo" class="h-8 w-auto rounded-lg group-hover:scale-105 transition-transform">
      
    </a>
    <div class="w-px h-5 bg-white/10 hidden sm:block"></div>
    <div class="flex-1 relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" placeholder="Search providers..." onkeydown="if(event.key==='Enter') window.location.href='/doc.html?q='+this.value" class="w-full bg-transparent border-none text-sm text-white placeholder-zinc-500 focus:outline-none focus:ring-0 pl-9 pr-4 py-1.5">
    </div>
    <div class="flex items-center gap-4 flex-shrink-0">
      <a href="/doc.html" class="text-xs font-medium text-zinc-400 hover:text-white transition-colors hidden sm:block">Docs</a>
      <a href="https://github.com/junioralive/xyra-api" target="_blank" class="text-zinc-500 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .5a12 12 0 0 0-3.79 23.4c.6.1.82-.26.82-.58v-2.04c-3.34.72-4.05-1.6-4.05-1.6a3.18 3.18 0 0 0-1.35-1.78c-1.11-.74.08-.73.08-.73a2.53 2.53 0 0 1 1.85 1.23 2.57 2.57 0 0 0 3.49 1 2.6 2.6 0 0 1 .77-1.62C6.48 16.91 3.94 15.9 3.94 11.8a4.6 4.6 0 0 1 1.22-3.2 4.29 4.29 0 0 1 .11-3.15s1-.31 3.26 1.21a11.08 11.08 0 0 1 5.94 0c2.3-1.53 3.26-1.21 3.26-1.21a4.3 4.3 0 0 1 .11 3.15 4.6 4.6 0 0 1 1.22 3.2c0 4.1-2.55 5.11-4.98 5.37a2.89 2.89 0 0 1 .82 2.24v3.34c0 .32.22.69.82.58A12 12 0 0 0 12 .5Z"/></svg>
      </a>
      <a href="https://discord.gg/cwDTVKyKJz" target="_blank" class="text-zinc-500 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.369a19.791 19.791 0 0 0-4.885-1.518.074.074 0 0 0-.079.037c-.21.37-.444.856-.608 1.237a19.021 19.021 0 0 0-5.486 0 12.239 12.239 0 0 0-.617-1.237.077.077 0 0 0-.08-.037A19.571 19.571 0 0 0 3.683 4.37a.069.069 0 0 0-.032.027C.533 9.039-.319 13.578.099 18.057a.082.082 0 0 0 .031.056 19.984 19.984 0 0 0 5.992 3.041.077.077 0 0 0 .084-.026c.46-.63.869-1.3 1.226-2a.076.076 0 0 0-.041-.104 13.13 13.13 0 0 1-1.872-.883.075.075 0 0 1-.008-.126 9.584 9.584 0 0 0 .372-.293.074.074 0 0 1 .076-.01 15.613 15.613 0 0 0 10.534 0 .074.074 0 0 1 .076.009c.121.095.247.195.373.294a.075.075 0 0 1-.006.126 13.167 13.167 0 0 1-1.873.882.076.076 0 0 0-.041.105c.36.7.769 1.37 1.227 2a.075.075 0 0 0 .084.026 19.958 19.958 0 0 0 5.993-3.04.076.076 0 0 0 .031-.056c.5-5.146-.838-9.631-3.552-13.661a.062.062 0 0 0-.033-.028Zm-12.12 9.584c-1.182 0-2.156-1.08-2.156-2.408 0-1.327.955-2.408 2.156-2.408 1.21 0 2.175 1.1 2.156 2.408 0 1.328-.955 2.408-2.156 2.408Zm7.609 0c-1.182 0-2.156-1.08-2.156-2.408 0-1.327.955-2.408 2.156-2.408 1.21 0 2.175 1.1 2.156 2.408 0 1.328-.946 2.408-2.156 2.408Z"/></svg>
      </a>
    </div>
  </nav>

  <div class="flex-1 flex flex-col items-center justify-center text-center max-w-md fade-in mx-auto">
    <!-- Monochrome Ghost Icon -->
    <div class="w-24 h-24 mx-auto mb-8 float relative">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full text-white">
        <path d="M12 2C7.58172 2 4 5.58172 4 10V22L7 19L10 22L13 19L16 22L19 19L20 20V10C20 5.58172 16.4183 2 12 2Z" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
        <circle cx="15" cy="10" r="1.5" fill="currentColor"/>
        <path d="M10 14C10 14 11 15 12 15C13 15 14 14 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="text-6xl font-bold text-white mb-4 tracking-tight">404</h1>
    <h2 class="text-xl font-medium text-white mb-3">Page Not Found</h2>
    <p class="text-zinc-500 mb-8 leading-relaxed">
      The ghost of this page is busy scaring away bugs in the code. It seems to be ghosting us both.
    </p>

    <a href="/" class="inline-flex items-center justify-center px-6 py-3 rounded-xl bg-white text-black font-medium text-sm hover:bg-zinc-200 transition-colors">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Take Me Home
    </a>
  </div>

  <footer class="py-12 text-center reveal reveal-delay-1">
    <p class="text-xs text-zinc-600">© 2025 Xyra API. Built by <span class="text-zinc-500">junioralive</span>.</p>
  </footer>

  <script>
    (function() {
      const ro = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); ro.unobserve(e.target); } });
      }, { threshold: 0.1, rootMargin: "0px 0px -20px 0px" });
      document.querySelectorAll(".reveal").forEach(el => ro.observe(el));
    })();
  </script>
</body>
</html>
